<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【予約管理】セレネス・ダッシュボード</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; color: #333; }
        .app-container { background: #fff; max-width: 900px; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; box-sizing: border-box;}
        h1 { font-size: 1.3em; border-bottom: 2px solid #A68B5B; padding-bottom: 10px; margin-top: 0; margin-bottom: 20px; text-align: center; color: #333;}
        
        /* タブデザイン */
        .tab-wrapper { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: nowrap; overflow-x: auto;}
        .tab-btn { flex: 1; padding: 12px 2px; border: 1px solid #ccc; background: #f9f9f9; color: #666; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.85em; text-align: center; transition: 0.2s; white-space: nowrap;}
        .tab-btn.active { background: #A68B5B; color: white; border-color: #A68B5B; }

        /* カレンダーのスタイル */
        .cal-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 10px; background: #fff;}
        .cal-table th { background: #f8f8f8; padding: 10px 0; border: 1px solid #ddd; font-size: 0.8em; color: #666;}
        .cal-table td { height: 90px; border: 1px solid #ddd; vertical-align: top; padding: 4px; cursor: pointer; position: relative;}
        .cal-table td:hover { background: #fcfaf7; }
        .cal-day-num { font-size: 0.85em; font-weight: bold; color: #888; margin-bottom: 4px; display: block;}
        .cal-today { background-color: #fff9e6 !important; }
        .cal-selected { border: 2px solid #A68B5B !important; background-color: #fcfaf7; }
        .cal-sunday { color: #d9534f; }
        .cal-saturday { color: #5b7da6; }
        .cal-res-info { font-size: 0.7em; line-height: 1.3; }
        .cal-count-box { display: block; background: #eee; border-radius: 3px; padding: 1px 3px; margin-bottom: 2px; font-weight: bold; text-align: center;}
        .cal-m { color: #5b7da6; }
        .cal-f { color: #d9534f; }
        .cal-s { color: #7c5ba6; }

        /* 編集バナー */
        #edit-banner { background: #f0ad4e; color: white; text-align: center; padding: 12px; font-weight: bold; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 0.9em; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}

        /* 予約詳細エリア */
        .day-detail-area { margin-top: 20px; padding: 15px; background: #fafafa; border-radius: 8px; border: 1px solid #eee; display: none; }
        .day-detail-title { font-size: 1.1em; font-weight: bold; color: #A68B5B; margin-bottom: 15px; border-left: 4px solid #A68B5B; padding-left: 10px; display: flex; justify-content: space-between; align-items: center;}
        .btn-add-inline { background: #5b7da6; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 0.8em; font-weight: bold; cursor: pointer; }

        /* 予約カード（見やすさ特化） */
        .res-card { display: flex; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 15px; padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); align-items: flex-start; }
        .res-time { font-size: 1.4em; font-weight: bold; color: #A68B5B; width: 75px; flex-shrink: 0; padding-top: 2px; letter-spacing: -0.5px;}
        .res-info { flex-grow: 1; min-width: 0; }
        .res-name { font-size: 1.15em; font-weight: bold; color: #333; display: block; margin-bottom: 8px; }
        
        .res-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        .tag { font-size: 0.8em; padding: 4px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; }
        .tag-purpose { background: #fdf5e6; color: #A68B5B; border: 1px solid #f0e0c0; }
        .tag-m { background: #eef4fb; color: #5b7da6; border: 1px solid #d0e0f0; }
        .tag-f { background: #fdf2f2; color: #d9534f; border: 1px solid #f0d0d0; }
        .tag-people { background: #eee; color: #555; }
        
        .res-contact { font-size: 0.9em; margin-bottom: 6px; color: #666; font-weight: bold;}
        .res-note { font-size: 0.85em; color: #666; background: #fafafa; padding: 10px; border-radius: 4px; margin-top: 5px; border: 1px dashed #ccc; line-height: 1.5;}
        
        .res-actions-new { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
        .btn-edit-new, .btn-del-new { padding: 8px 15px; border-radius: 4px; font-size: 0.85em; cursor: pointer; border: none; font-weight: bold; }
        .btn-edit-new { background: #eef4fb; color: #5b7da6; }
        .btn-del-new { background: #fdf2f2; color: #d9534f; }

        /* 入力フォーム用スタイル */
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; color: #555;}
        input, select, textarea { width: 100%; padding: 15px 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; font-family: inherit;}
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px;}
        .radio-label { position: relative; flex: 1; min-width: 30%; text-align: center; border: 1px solid #ccc; border-radius: 6px; padding: 15px 5px; cursor: pointer; background: #fff; transition: 0.2s; font-size: 0.9em; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .radio-label input { position: absolute; opacity: 0; }
        .radio-label.selected { background: #A68B5B; color: #fff; border-color: #A68B5B; box-shadow: 0 2px 5px rgba(166,139,91,0.3);}
        .btn-submit { background-color: #A68B5B; color: white; border: none; padding: 18px; margin-top: 25px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1em; box-shadow: 0 4px 10px rgba(0,0,0,0.15);}

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 15px 24px; border-radius: 30px; font-size: 0.95em; display: none; z-index: 3000; font-weight: bold;}
        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 2000; display: flex; justify-content: center; align-items: center; border-radius: 8px; font-weight: bold; color: #A68B5B; flex-direction: column;}
        
        /* ▼ スマホ用 超最適化レイアウト ▼ */
        @media (max-width: 600px) {
            body { padding: 0; background-color: #fff;}
            .app-container { max-width: 100%; border-radius: 0; padding: 15px 10px; box-shadow: none;}
            
            /* タブの文字とパディングを調整して1列に収める */
            .tab-btn { font-size: 0.75em; padding: 10px 2px; min-width: 0; letter-spacing: -0.5px;}
            
            /* カレンダーの縮小対応 */
            .cal-table td { height: 65px; padding: 2px; }
            .cal-day-num { font-size: 0.8em; margin-bottom: 2px; }
            .cal-res-info { font-size: 0.65em; transform: scale(0.9); transform-origin: top center; white-space: nowrap;}
            .cal-count-box { padding: 1px; margin-bottom: 1px; }

            /* 予約カードをスマホ専用の縦並びに */
            .res-card { flex-direction: column; padding: 15px; }
            .res-time { width: 100%; font-size: 1.2em; border-bottom: 1px dashed #eee; margin-bottom: 10px; padding-bottom: 8px; }
            .res-actions-new { justify-content: space-between; width: 100%; margin-top: 15px; }
            .btn-edit-new, .btn-del-new { flex: 1; text-align: center; padding: 12px; font-size: 0.95em; }
            
            /* ラジオボタンと時間入力のデカ化 */
            .radio-label { min-width: 100%; }
            #add-time-h, #add-time-m { font-size: 1.5em; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loading-overlay">データ同期中...</div>
    <h1>セレネス 予約管理</h1>
    
    <div class="tab-wrapper">
        <button class="tab-btn active" id="tab-calendar" onclick="switchTab('calendar')">📅 カレンダー</button>
        <button class="tab-btn" id="tab-today" onclick="switchTab('today')">今日</button>
        <button class="tab-btn" id="tab-add" onclick="switchTab('add')">＋ 登録</button>
        <button class="tab-btn" id="tab-all" onclick="switchTab('all')">すべて</button>
    </div>

    <div id="edit-banner">現在、予約内容を編集しています...</div>
    <input type="hidden" id="edit-id">

    <div id="section-calendar">
        <div style="text-align: center; margin-bottom: 10px; font-weight: bold;">
            <button onclick="changeMonth(-1)" style="padding: 5px 15px; background:none; border:1px solid #ccc; border-radius:4px;">＜</button>
            <span id="cal-month-title" style="margin: 0 15px; font-size: 1.1em; color: #A68B5B;">2026年 4月</span>
            <button onclick="changeMonth(1)" style="padding: 5px 15px; background:none; border:1px solid #ccc; border-radius:4px;">＞</button>
        </div>
        <table class="cal-table">
            <thead>
                <tr><th class="cal-sunday">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th class="cal-saturday">土</th></tr>
            </thead>
            <tbody id="calendar-body"></tbody>
        </table>

        <div id="day-detail-area" class="day-detail-area">
            <div class="day-detail-title">
                <span id="selected-date-label">選択日の予約詳細</span>
                <button class="btn-add-inline" id="btn-goto-add">＋ 新規予約</button>
            </div>
            <div id="day-detail-list"></div>
        </div>
    </div>

    <div id="section-list" style="display: none;">
        <div id="reservation-container"></div>
    </div>

    <div id="section-add" style="display: none;">
        <h3 id="form-title" style="text-align: center; color: #A68B5B; margin-top:0;">新規予約の登録</h3>
        
        <label>来店日</label>
        <input type="date" id="add-date">
        
        <label>来店目的</label>
        <div class="radio-group" id="purpose-group">
            <label class="radio-label"><input type="radio" name="purpose" value="相席希望あり">相席希望あり</label>
            <label class="radio-label"><input type="radio" name="purpose" value="相席希望なし">相席希望なし</label>
            <label class="radio-label"><input type="radio" name="purpose" value="相談">相談</label>
        </div>
        
        <label>来店時間</label>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="tel" id="add-time-h" maxlength="2" placeholder="19" style="text-align: center;" oninput="if(this.value.length === 2) document.getElementById('add-time-m').focus();">
            <b style="font-size:1.5em; color:#666;">:</b>
            <input type="tel" id="add-time-m" maxlength="2" placeholder="00" style="text-align: center;">
        </div>
        
        <label>お名前</label>
        <input type="text" id="add-name" placeholder="お客様名">
        
        <label>性別</label>
        <div class="radio-group" id="gender-group">
            <label class="radio-label"><input type="radio" name="gender" value="男性">男性</label>
            <label class="radio-label"><input type="radio" name="gender" value="女性">女性</label>
        </div>
        
        <label>人数</label>
        <select id="add-people">
            <option value="1">1名</option><option value="2">2名</option><option value="3">3名</option><option value="4">4名</option><option value="5">5名以上</option>
        </select>
        
        <label>電話番号</label>
        <input type="tel" id="add-phone" placeholder="09012345678">
        
        <label>備考</label>
        <textarea id="add-note" rows="3" placeholder="要望・メモ"></textarea>
        
        <button class="btn-submit" id="btn-add-submit" onclick="adminAddReservation()">予約を確定する</button>
        <button id="btn-cancel-edit" style="display:none; margin-top:15px; background:#e0e0e0; color:#333; border:none; width:100%; padding:16px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:1em;" onclick="cancelEdit()">編集をキャンセル</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3lwm9jpy0xD5Ou5SU_1zerxmdwaVzm3S-tVA80NQ_355QsH_dy0s_GlyC1zBa6cTblA/exec";
    
    let allReservations = []; 
    let currentTab = 'calendar';
    const today = new Date();
    const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth() + 1;
    let selectedDate = null;

    window.onload = () => {
        loadReservations();
        document.getElementById('add-date').value = todayStr;
        initSelectionUI('purpose');
        initSelectionUI('gender');
    };

    function initSelectionUI(name) {
        document.querySelectorAll(`input[name="${name}"]`).forEach(input => {
            input.addEventListener('change', function() {
                document.querySelectorAll(`input[name="${name}"]`).forEach(i => i.parentElement.classList.remove('selected'));
                if (this.checked) this.parentElement.classList.add('selected');
            });
        });
    }

    function loadReservations() {
        document.getElementById('loading-overlay').style.display = 'flex';
        fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                allReservations = (data.reserve || []).map(r => {
                    if (r.date && String(r.date).includes('T')) {
                        const d = new Date(r.date);
                        r.date = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                    }
                    if (r.time && String(r.time).includes('T')) {
                        const t = new Date(r.time);
                        r.time = String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0');
                    }
                    if (r.phone) {
                        r.phone = String(r.phone);
                        if (!r.phone.startsWith('0') && r.phone.length >= 9) r.phone = '0' + r.phone;
                    }
                    return r;
                });
                
                sortReservations();
                renderCurrentView();
                document.getElementById('loading-overlay').style.display = 'none';
            })
            .catch(err => {
                console.error("通信エラー", err);
                document.getElementById('loading-overlay').style.display = 'none';
            });
    }

    function sortReservations() {
        allReservations.sort((a, b) => new Date(a.date) - new Date(b.date) || String(a.time).localeCompare(String(b.time)));
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        
        document.getElementById('section-calendar').style.display = (tab === 'calendar' ? 'block' : 'none');
        document.getElementById('section-list').style.display = (tab === 'add' || tab === 'calendar' ? 'none' : 'block');
        document.getElementById('section-add').style.display = (tab === 'add' ? 'block' : 'none');
        
        if (tab === 'calendar' && selectedDate) renderDayDetail(selectedDate);
        renderCurrentView();
    }

    function renderCurrentView() {
        if (currentTab === 'calendar') renderCalendar();
        else if (currentTab !== 'add') renderList();
    }

    function renderCalendar() {
        document.getElementById('cal-month-title').textContent = `${viewYear}年 ${viewMonth}月`;
        const body = document.getElementById('calendar-body');
        body.innerHTML = '';
        const firstDay = new Date(viewYear, viewMonth - 1, 1).getDay();
        const lastDate = new Date(viewYear, viewMonth, 0).getDate();
        let date = 1;

        for (let i = 0; i < 6; i++) {
            const row = document.createElement('tr');
            for (let j = 0; j < 7; j++) {
                const cell = document.createElement('td');
                if ((i === 0 && j < firstDay) || date > lastDate) {
                    // 空白
                } else {
                    const dStr = `${viewYear}-${String(viewMonth).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
                    if(dStr === todayStr) cell.classList.add('cal-today');
                    if(dStr === selectedDate) cell.classList.add('cal-selected');
                    if(j === 0) cell.classList.add('cal-sunday');
                    if(j === 6) cell.classList.add('cal-saturday');

                    const dayRes = allReservations.filter(r => r.date === dStr);
                    const m = dayRes.filter(r => r.gender === '男性').length;
                    const f = dayRes.filter(r => r.gender === '女性').length;
                    const s = dayRes.filter(r => r.purpose === '相談').length;

                    cell.innerHTML = `<span class="cal-day-num">${date}</span>`;
                    if(dayRes.length > 0) {
                        cell.innerHTML += `
                            <div class="cal-res-info">
                                <span class="cal-count-box">${dayRes.length}件</span>
                                ${m > 0 ? `<span class="cal-m">♂${m}</span> ` : ''}
                                ${f > 0 ? `<span class="cal-f">♀${f}</span> ` : ''}
                                ${s > 0 ? `<br><span class="cal-s">教${s}</span>` : ''}
                            </div>`;
                    }
                    cell.onclick = () => {
                        selectedDate = dStr;
                        renderCalendar(); 
                        renderDayDetail(dStr);
                    };
                    date++;
                }
                row.appendChild(cell);
            }
            body.appendChild(row);
            if (date > lastDate) break;
        }
    }

    function renderDayDetail(dateStr) {
        const area = document.getElementById('day-detail-area');
        const list = document.getElementById('day-detail-list');
        const label = document.getElementById('selected-date-label');
        
        label.textContent = `${dateStr.replace(/-/g, '/')} の予約`;
        area.style.display = 'block';
        list.innerHTML = '';

        const dayRes = allReservations.filter(r => r.date === dateStr);

        if (dayRes.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:#999; padding:20px;">予約はありません</div>`;
        } else {
            dayRes.forEach(r => list.appendChild(createResCard(r)));
        }

        document.getElementById('btn-goto-add').onclick = () => {
            cancelEdit();
            document.getElementById('add-date').value = dateStr;
            switchTab('add');
        };
        
        area.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // --- 予約カード（シンプル＆見やすさ特化） ---
    function createResCard(r) {
        const card = document.createElement('div');
        card.className = 'res-card';
        
        const genderClass = r.gender === '男性' ? 'tag-m' : 'tag-f';
        const noteHtml = r.note ? `<div class="res-note">📝 ${r.note.replace(/\n/g, '<br>')}</div>` : '';
        
        card.innerHTML = `
            <div class="res-time">${r.time}</div>
            <div class="res-info">
                <div class="res-name">${r.name} 様</div>
                <div class="res-tags">
                    <span class="tag tag-people">${r.people}名</span>
                    <span class="tag ${genderClass}">${r.gender}</span>
                    <span class="tag tag-purpose">${r.purpose}</span>
                </div>
                <div class="res-contact">📞 <a href="tel:${r.phone}" style="color:#5b7da6; text-decoration:none;">${r.phone}</a></div>
                ${noteHtml}
                
                <div class="res-actions-new">
                    <button class="btn-edit-new" onclick="editReservation(${r.id})">編集</button>
                    <button class="btn-del-new" onclick="deleteRes(${r.id})">削除</button>
                </div>
            </div>
        `;
        return card;
    }

    function renderList() {
        const container = document.getElementById('reservation-container');
        container.innerHTML = '';
        let filtered = [];
        if (currentTab === 'today') filtered = allReservations.filter(r => r.date === todayStr);
        else if (currentTab === 'upcoming') filtered = allReservations.filter(r => r.date > todayStr);
        else filtered = [...allReservations].reverse();

        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center;color:#999;padding:40px;">予約はありません</div>`;
            return;
        }

        let currentDate = '';
        filtered.forEach(r => {
            if (currentDate !== r.date) {
                currentDate = r.date;
                const dateHeader = document.createElement('div');
                dateHeader.style.cssText = "font-size:0.9em; color:#A68B5B; margin:20px 0 8px; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px;";
                dateHeader.textContent = currentDate.replace(/-/g,'/');
                container.appendChild(dateHeader);
            }
            container.appendChild(createResCard(r));
        });
    }

    // --- 編集・保存ロジック ---
    function editReservation(id) {
        const r = allReservations.find(res => res.id === id);
        if (!r) return;

        document.getElementById('edit-id').value = r.id;
        document.getElementById('add-date').value = r.date;
        document.getElementById('add-name').value = r.name;
        document.getElementById('add-phone').value = r.phone;
        document.getElementById('add-note').value = r.note;
        document.getElementById('add-people').value = r.people;

        const timeParts = r.time.split(':');
        document.getElementById('add-time-h').value = timeParts[0] || '';
        document.getElementById('add-time-m').value = timeParts[1] || '';

        setRadioValue('purpose', r.purpose);
        setRadioValue('gender', r.gender);

        document.getElementById('edit-banner').style.display = 'block';
        document.getElementById('form-title').textContent = "予約内容の修正";
        document.getElementById('btn-add-submit').textContent = "変更内容を保存する";
        document.getElementById('btn-cancel-edit').style.display = 'block';

        switchTab('add');
        window.scrollTo(0, 0);
    }

    function setRadioValue(name, value) {
        const inputs = document.querySelectorAll(`input[name="${name}"]`);
        inputs.forEach(i => {
            if (i.value === value) {
                i.checked = true;
                i.parentElement.classList.add('selected');
            } else {
                i.checked = false;
                i.parentElement.classList.remove('selected');
            }
        });
    }

    function cancelEdit() {
        document.getElementById('edit-id').value = '';
        document.getElementById('edit-banner').style.display = 'none';
        document.getElementById('form-title').textContent = "新規予約の登録";
        document.getElementById('btn-add-submit').textContent = "予約を確定する";
        document.getElementById('btn-cancel-edit').style.display = 'none';
    }

    function adminAddReservation() {
        const editId = document.getElementById('edit-id').value;
        const date = document.getElementById('add-date').value;
        const purpose = document.querySelector('input[name="purpose"]:checked')?.value;
        const h = document.getElementById('add-time-h').value || '19';
        const m = document.getElementById('add-time-m').value || '00';
        const time = h.padStart(2,'0') + ':' + m.padStart(2,'0');
        const name = document.getElementById('add-name').value.trim();
        const gender = document.querySelector('input[name="gender"]:checked')?.value;
        const people = document.getElementById('add-people').value;
        const phone = document.getElementById('add-phone').value.trim();
        const note = document.getElementById('add-note').value;

        if (!date || !purpose || !name || !gender || !phone) return alert("必須項目が空です");

        const isEdit = !!editId;
        const record = { 
            id: isEdit ? parseInt(editId) : Date.now(), 
            date, time, name, gender, people, phone, purpose, note, status: "" 
        };
        
        if (isEdit) {
            const idx = allReservations.findIndex(res => res.id === record.id);
            if (idx !== -1) allReservations[idx] = record;
        } else {
            allReservations.push(record);
        }
        
        sortReservations();
        renderCurrentView();
        showToast(isEdit ? "修正を保存しました" : "登録しました（同期中...）");

        if (isEdit) cancelEdit();

        const type = isEdit ? 'reserve_update' : 'reserve_save';
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: type, id: record.id, record: record }) })
            .catch(err => alert("通信エラー"));
    }

    function deleteRes(id) {
        if(!confirm("この予約を削除しますか？")) return;
        
        allReservations = allReservations.filter(r => r.id !== id);
        renderCurrentView();
        if (currentTab === 'calendar' && selectedDate) renderDayDetail(selectedDate);
        showToast("削除しました");

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'reserve_delete', id }) })
            .catch(err => alert("通信エラー"));
    }

    function changeMonth(offset) {
        viewMonth += offset;
        if(viewMonth < 1) { viewMonth = 12; viewYear--; }
        if(viewMonth > 12) { viewMonth = 1; viewYear++; }
        selectedDate = null;
        document.getElementById('day-detail-area').style.display = 'none';
        renderCalendar();
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }
</script>
</body>
</html>
